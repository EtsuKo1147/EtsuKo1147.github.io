<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ETSUKO</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Helvetica Neue", Arial, sans-serif;
}

body {
  background: #fff;
  color: #000;
}

/* ===== NAVBAR ===== */
.navbar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 80px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 60px;
  background: white;
  z-index: 1000;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  letter-spacing: 3px;
}

.nav-links {
  display: flex;
  gap: 30px;
  font-size: 14px;
  letter-spacing: 1px;
}

/* ===== SLIDER ===== */
.slider {
  position: relative;
  height: 100vh;
  overflow: hidden;
}

.slides {
  display: flex;
  height: 100%;
  transition: transform 0.8s ease;
}

.slide {
  min-width: 100%;
  height: 100%;
  position: relative;
}

.slide img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* 暗层 */
.slide::after {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.25);
  top: 0;
  left: 0;
}

/* 文案 */
.hero-text {
  position: absolute;
  top: 35%;
  left: 10%;
  color: white;
  z-index: 2;
  opacity: 0;
  transform: translateY(30px);
  transition: all 1s ease;
}

.hero-text.show {
  opacity: 1;
  transform: translateY(0);
}

.hero-text h1 {
  font-size: 60px;
  letter-spacing: 6px;
}

/* 按钮 */
.hero-text button {
  margin-top: 20px;
  padding: 10px 25px;
  border: 1px solid white;
  background: transparent;
  color: white;
  cursor: pointer;
}

/* 箭头 */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  font-size: 40px;
  color: white;
  padding: 10px;
  cursor: pointer;
  opacity: 0;
  transition: 0.3s;
  z-index: 2;
}

.slider:hover .arrow {
  opacity: 1;
}

.arrow.left {
  left: 20px;
}

.arrow.right {
  right: 20px;
}

/* 小圆点 */
.dots {
  position: absolute;
  bottom: 30px;
  width: 100%;
  text-align: center;
}

.dot {
  width: 10px;
  height: 10px;
  margin: 5px;
  display: inline-block;
  background: white;
  border-radius: 50%;
  opacity: 0.4;
  cursor: pointer;
}

.dot.active {
  opacity: 1;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="navbar">
  <div class="logo">ETSUKO</div>
  <div class="nav-links">
    <div>FASHION</div>
    <div>JEWELRY</div>
    <div>WATCH</div>
    <div>ABOUT</div>
  </div>
</div>

<!-- SLIDER -->
<div class="slider">
  <div class="slides">

    <div class="slide">
      <img src="1.jpg">
    </div>

    <div class="slide">
      <img src="2.jpg">
    </div>

    <div class="slide">
      <img src="3.jpg">
    </div>

      <div class="slide">
      <img src="4.jpg">
    </div>

      <div class="slide">
      <img src="5.jpg">
    </div>

  </div>

  <!-- 文案 -->
  <div class="hero-text">
    <p>こんにちは</p>
    <h1>ETSUKO</h1>
    <button>Explore</button>
  </div>

  <!-- 箭头 -->
  <div class="arrow left">&#10094;</div>
  <div class="arrow right">&#10095;</div>

  <!-- 小圆点 -->
  <div class="dots">
    <span class="dot active"></span>
    <span class="dot"></span>
    <span class="dot"></span>
  </div>
</div>

<script>
const slides = document.querySelector('.slides');
const slide = document.querySelectorAll('.slide');
const dots = document.querySelectorAll('.dot');
const prev = document.querySelector('.arrow.left');
const next = document.querySelector('.arrow.right');
const text = document.querySelector('.hero-text');

let index = 0;

function updateSlide() {
  slides.style.transform = `translateX(-${index * 100}%)`;

  dots.forEach(d => d.classList.remove('active'));
  dots[index].classList.add('active');

  text.classList.remove('show');
  setTimeout(() => text.classList.add('show'), 200);
}

next.onclick = () => {
  index = (index + 1) % slide.length;
  updateSlide();
};

prev.onclick = () => {
  index = (index - 1 + slide.length) % slide.length;
  updateSlide();
};

dots.forEach((dot, i) => {
  dot.onclick = () => {
    index = i;
    updateSlide();
  };
});

setInterval(() => {
  index = (index + 1) % slide.length;
  updateSlide();
}, 4000);

setTimeout(() => text.classList.add('show'), 300);
</script>

</body>
</html>
