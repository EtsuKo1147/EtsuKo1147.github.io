<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Etsu Ko</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #fafaf9;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e8e8e5;
      border-radius: 16px;
      padding: 3rem;
      max-width: 620px;
      width: 100%;
    }

    .avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: #EEEDFE;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 500;
      color: #534AB7;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 28px;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .role {
      font-size: 15px;
      color: #666;
      margin-bottom: 1.5rem;
    }

    hr {
      border: none;
      border-top: 1px solid #e8e8e5;
      margin: 1.5rem 0;
    }

    p {
      font-size: 15px;
      color: #555;
      line-height: 1.8;
      margin-bottom: 1rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 1.5rem 0;
    }

    .tag {
      background: #0c0294;
      color: #73ff00;
      font-size: 12px;
      padding: 4px 12px;
      border-radius: 20px;
    }

    .links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .links a {
      font-size: 13px;
      color: #555;
      text-decoration: none;
      padding: 6px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    .links a:hover {
      background: #f5f5f3;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Your initials go here -->
    <div class="avatar">YN</div>

    <!-- Your name and short title -->
    <h1>Etsu Ko</h1>
    <p class="role">Designer · Developer · Writer — Tokyo, Japan</p>

    <hr>

    <!-- Your bio — write 2–3 short paragraphs about yourself -->
    <p>こんにちわ。私はコエツと申します。</p>

    <p>When I'm not at my desk, you'll find me exploring coffee shops, hiking, or reading a good book.</p>

    <!-- Your interests — add or remove tags freely -->
    <div class="tags">
      <span class="tag">Web design</span>
      <span class="tag">Photography</span>
      <span class="tag">Coffee</span>
      <span class="tag">Hiking</span>
    </div>

    <!-- Your links — replace # with your real URLs -->
    <div class="links">
      <a href="https://github.com/yourusername">GitHub</a>
      <a href="https://twitter.com/yourusername">Twitter</a>
      <a href="mailto:you@email.com">Email me</a>
    </div>

  </div>
</body>
</html>
