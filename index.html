<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ETSUKO</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: #fff;
      color: #000;
    }

    /* ===== NAVBAR ===== */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 60px;
      background: white;
      z-index: 1000;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: 3px;
    }

    .nav-links {
      display: flex;
      gap: 30px;
      font-size: 14px;
      letter-spacing: 1px;
    }

    /* ===== HERO ===== */
    .hero {
      height: 100vh;
      background: url("0P8A1188.jpg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
    }

    /* 暗层 */
    .hero::after {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.2);
      top: 0;
      left: 0;
    }

    /* 内容 */
    .hero-content {
      position: relative;
      color: white;
      z-index: 1;
    }

    .hero h1 {
      font-size: 48px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 30px;
      border: 1px solid white;
      color: white;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn:hover {
      background: white;
      color: black;
    }

  </style>
</head>

<body>

  <!-- NAV -->
  <div class="navbar">
    <div class="logo">ETSUKO</div>
    <div class="nav-links">
      <div>FASHION</div>
      <div>JEWELRY</div>
      <div>WATCH</div>
      <div>ABOUT</div>
    </div>
  </div>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-content">
      <p>こんにちわ</p>
      <h1>ETSUKO</h1>
      <a href="#" class="btn">Explore</a>
    </div>
  </section>

</body>
</html>
